#      .
#     / V\
#   / `  /
#  <<   |    External Secret example for baibot.
#  /    |    Provide sensitive values via pre-created Secrets.
#

user:
  # Create the user secret:
  # kubectl -n <namespace> create secret generic baibot-user \
  #   --from-literal=password='change_me' \
  #   --from-literal=recoveryPassphrase='long-and-secure-passphrase-here' \
  #   --from-literal=recoveryResetAllowed='false'
  existingSecret: baibot-user

persistence:
  # Create the persistence secret:
  # kubectl -n <namespace> create secret generic baibot-persistence \
  #   --from-literal=sessionEncryptionKey="$(openssl rand -hex 32)" \
  #   --from-literal=configEncryptionKey="$(openssl rand -hex 32)"
  existingSecret: baibot-persistence

agents:
  apiKeys:
    # Create the agent API key secret:
    # kubectl -n <namespace> create secret generic baibot-agent-api-keys \
    #   --from-literal=openai='YOUR_API_KEY_HERE'
    existingSecret: baibot-agent-api-keys

config:
  extra: |
    homeserver:
      server_name: matrix.example.com
      url: http://ess-synapse.ess.svc.cluster.local:8008

    user:
      mxid_localpart: baibot
      name: baibot
      avatar: null

    access:
      admin_patterns:
        - "@admin:matrix.example.com"

    agents:
      static_definitions:
        - id: openai
          provider: openai
          config:
            base_url: https://api.openai.com/v1
            text_generation:
              model_id: gpt-5.4
              prompt: "You are a brief, but helpful bot called {{ baibot_name }} powered by the {{ baibot_model_id }} model. The date/time of this conversation's start is: {{ baibot_conversation_start_time_utc }}."
              temperature: 1.0
              max_response_tokens: null
              max_completion_tokens: 128000
              max_context_tokens: 400000
              tools:
                web_search: false
                code_interpreter: false

    initial_global_config:
      handler:
        catch_all: null
        text_generation: static/openai
        text_to_speech: null
        speech_to_text: null
        image_generation: null
      user_patterns:
        - "@*:matrix.example.com"
